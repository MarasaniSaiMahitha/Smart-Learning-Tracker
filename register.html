<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#eef7f0,#f8f5ff);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            width:400px;
            background:#f5e9ff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#6d28d9;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #d1d5db;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            border-color:#8b5cf6;
        }

        button{
            width:100%;
            padding:12px;
            background:#8b5cf6;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#7c3aed;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            text-decoration:none;
            color:#6d28d9;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="register-box">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login/">Login</a>
    </div>
</div>

</body>
</html>
