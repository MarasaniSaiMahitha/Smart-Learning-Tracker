<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
</head>
<body>

<h1>Leaderboard</h1>

<table border="1">

<tr>
    <th>Rank</th>
    <th>User</th>
    <th>Total Score</th>
</tr>

{% for user in leaderboard %}

<tr>
    <td>{{ forloop.counter }}</td>
    <td>{{ user.username }}</td>
    <td>{{ user.total_score }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard/">
    Back to Dashboard
</a>

</body>
</html>
